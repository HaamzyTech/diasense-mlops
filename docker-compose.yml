services:
  frontend:
    build:
      context: ./apps/frontend
    container_name: diasense-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_API_BASE_URL=http://backend-api:8000
    depends_on:
      - backend-api

  backend-api:
    build:
      context: ./apps/backend-api
    container_name: diasense-backend-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=backend-api
      - APP_VERSION=0.1.0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=diasense
      - POSTGRES_USER=diasense
      - POSTGRES_PASSWORD=diasense
      - MODEL_SERVER_URL=http://model-server:5001
      - MLFLOW_TRACKING_URI=http://mlflow-tracking:5000
    depends_on:
      - postgres
      - model-server
      - mlflow-tracking

  model-server:
    build:
      context: ./infra/mlflow
    container_name: diasense-model-server
    command: ["mlflow", "models", "serve", "-m", "models:/diasense-diabetes-risk/Production", "-p", "5001", "--host", "0.0.0.0"]
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-tracking:5000
    ports:
      - "5001:5001"
    depends_on:
      - mlflow-tracking

  postgres:
    image: postgres:17-alpine
    container_name: diasense-postgres
    environment:
      - POSTGRES_DB=diasense
      - POSTGRES_USER=diasense
      - POSTGRES_PASSWORD=diasense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  mlflow-tracking:
    image: ghcr.io/mlflow/mlflow:v3.11.0
    container_name: diasense-mlflow-tracking
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:///mlflow.db", "--default-artifact-root", "/mlflow/artifacts"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  airflow-init:
    build:
      context: ./airflow
    container_name: diasense-airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://diasense:diasense@postgres:5432/diasense
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: ["airflow", "db", "migrate"]

  airflow-webserver:
    build:
      context: ./airflow
    container_name: diasense-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://diasense:diasense@postgres:5432/diasense
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: ["airflow", "webserver", "--port", "8080"]
    ports:
      - "8080:8080"

  airflow-scheduler:
    build:
      context: ./airflow
    container_name: diasense-airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://diasense:diasense@postgres:5432/diasense
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: ["airflow", "scheduler"]

  airflow-triggerer:
    build:
      context: ./airflow
    container_name: diasense-airflow-triggerer
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://diasense:diasense@postgres:5432/diasense
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: ["airflow", "triggerer"]

  prometheus:
    image: prom/prometheus:latest
    container_name: diasense-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: diasense-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  mlflow_data:
