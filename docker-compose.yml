services:
  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend-api:8000}
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./apps/backend-api
    ports:
      - "${BACKEND_API_PORT:-8000}:8000"
    environment:
      APP_NAME: backend-api
      APP_VERSION: 0.1.0
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MODEL_SERVER_URL: ${MODEL_SERVER_URL:-http://model-server:5001}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    depends_on:
      postgres:
        condition: service_healthy
      model-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5

  model-server:
    build:
      context: ./infra/mlflow
    command: ["mlflow", "models", "serve", "-m", "models:/diasense-diabetes-risk/Production", "-p", "5001", "--host", "0.0.0.0"]
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    ports:
      - "${MODEL_SERVER_PORT:-5001}:5001"
    depends_on:
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/ping').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diasense} -d ${POSTGRES_DB:-diasense}"]
      interval: 10s
      timeout: 5s
      retries: 8

  mlflow-tracking:
    image: ghcr.io/mlflow/mlflow:v3.11.0
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:///mlflow.db", "--default-artifact-root", "/mlflow/artifacts"]
    ports:
      - "${MLFLOW_TRACKING_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-diasense}:${POSTGRES_PASSWORD:-diasense}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-diasense}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow-tracking:
        condition: service_started
    command: ["airflow", "db", "migrate"]

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-diasense}:${POSTGRES_PASSWORD:-diasense}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-diasense}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow-tracking:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "webserver", "--port", "8080"]
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-diasense}:${POSTGRES_PASSWORD:-diasense}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-diasense}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow-tracking:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "scheduler"]

  airflow-triggerer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-diasense}:${POSTGRES_PASSWORD:-diasense}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-diasense}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow-tracking:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "triggerer"]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  mlflow_data:
