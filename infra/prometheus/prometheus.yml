global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: backend-api
    metrics_path: /metrics
    static_configs:
      - targets: ["backend-api:8000"]

  # Airflow does not expose Prometheus metrics by default in this stack.
  # Add airflow-exporter or statsd-exporter before enabling an airflow scrape job.
